<!DOCTYPE html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Making Your Own LucheShell Repository</title>

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/assets/vendor/github-markdown-dark.min.css">
    <link rel="stylesheet" href="/assets/vendor/a11y-dark.min.css">

    <script src="/js/loadnav.js"></script>
    <script src="/js/loadfoot.js"></script>
    <script src="/js/gridbg.js"></script>

    <script src="/assets/vendor/marked.umd.js"></script>
    <script src="/assets/vendor/purify.min.js"></script>
    <script src="/assets/vendor/markedalert.umd.min.js"></script>
    <script src="/assets/vendor/highlight.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="/assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <script>loadNav("blog")</script>
    <script>loadFoot()</script>

    <div class="blog-container">
        <aside class="blog-sidebar">
            <div class="sidebar-content">
                <h3>Blog Posts</h3>
                <div id="blog-tree"></div>
            </div>
        </aside>
        <main class="blog-main">
            <article class="blog-content markdown-body google-sans-regular">
                <div class="blog-loading">Loading article…</div>
            </article>
            <script>
                var blogContent = document.getElementsByClassName('blog-content')[0];
                fetch('/blog/md/create-lush-repo.md')
                    .then(function(response) {
                        if (!response.ok) {
                            throw new Error('Failed to load article');
                        }
                        return response.text();
                    })
                    .then(function(markdown) {
                        marked.use(markedAlert());

                        var blogContent = document.querySelector('.blog-content');
                        blogContent.innerHTML = DOMPurify.sanitize(marked.parse(markdown));

                        // 1. RUN THIS DIRECTLY: Colors the raw bash scripts and command flags
                        hljs.highlightAll();

                        // 2. RUN THIS DIRECTLY: Appends the floating copy controls inside the box corners
                        addCopyButtons();
                    })
                    .catch(function(error) {
                        console.error(error);
                        var errorContent = document.querySelector('.blog-content');
                        if (errorContent) {
                            errorContent.innerHTML = '<p class="blog-loading">The article could not be loaded right now.</p>';
                        }
                    });

                // The functionality logic for copying text
                function addCopyButtons() {
                    // Target all pre elements rendered inside your markdown node container
                    var codeBlocks = document.querySelectorAll('.markdown-body pre');

                    codeBlocks.forEach(function(pre) {
                        // Stop if a button is already appended inside this block
                        if (pre.querySelector('.copy-code-btn')) return;

                        // Force relative position directly onto the pre element style layer
                        pre.style.position = 'relative';

                        // Set up the button properties
                        var button = document.createElement('button');
                        button.className = 'copy-code-btn google-sans-regular';
                        button.type = 'button';
                        button.innerText = 'Copy';

                        button.addEventListener('click', function() {
                            var codeText = pre.querySelector('code').innerText;
                            navigator.clipboard.writeText(codeText).then(function() {
                                button.innerText = 'Copied!';
                                button.classList.add('copied');
                                setTimeout(function() {
                                    button.innerText = 'Copy';
                                    button.classList.remove('copied');
                                }, 2000);
                            }).catch(function(err) {
                                console.error('Could not copy text: ', err);
                            });
                        });

                        // Append the button directly inside the code container
                        pre.appendChild(button);
                    });
                }
            </script>
        </main>
    </div>
    <script>
        // Blog posts data
        const blogPosts = [
            { title: 'Making Your Own LucheShell Repository', path: '/blog/create-lush-repo.html' }
        ];

        // Generate blog tree
        function generateBlogTree() {
            const treeContainer = document.getElementById('blog-tree');
            const ul = document.createElement('ul');

            blogPosts.forEach(post => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = post.path;
                a.textContent = post.title;
                li.appendChild(a);
                ul.appendChild(li);
            });

            treeContainer.appendChild(ul);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', generateBlogTree);
    </script>
</body>
</html>
