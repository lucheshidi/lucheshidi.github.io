<!DOCTYPE html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Title</title>

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/assets/vendor/github-markdown-dark.min.css">

    <script src="/js/loadnav.js"></script>
    <script src="/js/loadfoot.js"></script>
    <script src="/js/gridbg.js"></script>

    <script src="/assets/vendor/marked.umd.js"></script>
    <script src="/assets/vendor/purify.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapi.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="shortcut icon" href="/assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <script>loadNav("blog")</script>
    <script>loadFoot()</script>

    <div class="blog-container">
        <aside class="blog-sidebar">
            <div class="sidebar-content">
                <h3>Blog Posts</h3>
                <div id="blog-tree"></div>
            </div>
        </aside>
        <main class="blog-main">
            <article class="blog-content markdown-body google-sans-regular">
                <div class="blog-loading">Loading article…</div>
            </article>
            <script>
                var blogContent = document.getElementsByClassName('blog-content')[0];
                fetch('/blog/md/blog-title.md')
                    .then(function(response) {
                        if (!response.ok) {
                            throw new Error('Failed to load article');
                        }
                        return response.text();
                    })
                    .then(function(markdown) {
                        blogContent.innerHTML = DOMPurify.sanitize(marked.parse(markdown));
                    })
                    .catch(function(error) {
                        console.error(error);
                        blogContent.innerHTML = '<p class="blog-loading">The article could not be loaded right now.</p>';
                    });
            </script>
        </main>
    </div>
    <script>
        // Blog posts data
        const blogPosts = [
            { title: 'Blog Title', path: '/blog/blog-title.html' }
        ];

        // Generate blog tree
        function generateBlogTree() {
            const treeContainer = document.getElementById('blog-tree');
            const ul = document.createElement('ul');

            blogPosts.forEach(post => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = post.path;
                a.textContent = post.title;
                li.appendChild(a);
                ul.appendChild(li);
            });

            treeContainer.appendChild(ul);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', generateBlogTree);
    </script>
</body>
</html>
